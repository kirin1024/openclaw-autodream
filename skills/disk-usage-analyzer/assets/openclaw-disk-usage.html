<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 磁盘使用情况 - 矩形树图</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .info {
      text-align: center;
      margin-bottom: 20px;
      color: #888;
      font-size: 14px;
    }
    #chart {
      width: 100%;
      height: 80vh;
      background: #16213e;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <h1>📂 OpenClaw 磁盘使用情况</h1>
  <p class="info">总大小: <!--TOTAL_SIZE--> | 更新于 <!--UPDATE_TIME--></p>
  <div id="chart"></div>

  <script>
    const chart = echarts.init(document.getElementById('chart'));

    const data = <!--DATA_JSON-->;

    const option = {
      tooltip: {
        formatter: function (info) {
          var value = info.value;
          var treePathInfo = info.treePathInfo;
          var treePath = [];
          for (var i = 1; i < treePathInfo.length; i++) {
            treePath.push(treePathInfo[i].name);
          }
          return [
            '<div class="tooltip-title">' + echarts.format.encodeHTML(treePath.join('/')) + '</div>',
            '大小: ' + echarts.format.addSizePrefix(value, 1024)
          ].join('');
        }
      },
      series: [
        {
          name: '磁盘使用',
          type: 'treemap',
          visibleMin: 300,
          label: {
            show: true,
            formatter: '{b}'
          },
          upperLabel: {
            show: true,
            height: 30,
            color: '#fff'
          },
          itemStyle: {
            borderColor: '#1a1a2e',
            borderWidth: 2,
            gapWidth: 2
          },
          levels: [
            {
              itemStyle: {
                borderColor: '#1a1a2e',
                borderWidth: 0,
                gapWidth: 5
              },
              upperLabel: {
                show: false
              }
            },
            {
              itemStyle: {
                borderColor: '#1a1a2e',
                borderWidth: 5,
                gapWidth: 1
              },
              upperLabel: {
                show: true,
                backgroundColor: '#1a1a2e',
                color: '#eee'
              }
            },
            {
              colorSaturation: [0.35, 0.5],
              itemStyle: {
                borderWidth: 5,
                borderColorSaturation: 0.6,
                gapWidth: 1
              }
            }
          ],
          data: data.children
        }
      ]
    };

    chart.setOption(option);

    window.addEventListener('resize', function () {
      chart.resize();
    });
  </script>
</body>
</html>
